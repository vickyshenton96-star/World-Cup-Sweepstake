<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Sweepstake</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#fff;min-height:100vh;}

  header{background:#0d1f3c;border-bottom:1px solid rgba(255,255,255,0.08);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;}
  header .trophy{font-size:1.8rem;}
  header h1{font-size:1.2rem;font-weight:600;}
  header p{font-size:0.8rem;color:rgba(255,255,255,0.5);margin-top:2px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#6b7280;margin-left:auto;flex-shrink:0;transition:background 0.3s;}
  .sync-dot.synced{background:#34d399;}
  .sync-dot.syncing{background:#fbbf24;animation:pulse 1s infinite;}
  .sync-dot.error{background:#f87171;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .container{max-width:860px;margin:0 auto;padding:1.5rem;}

  .btn{padding:0.6rem 1.2rem;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:all 0.15s;}
  .btn-primary{background:#2563eb;color:#fff;}
  .btn-primary:hover{background:#1d4ed8;}
  .btn-green{background:#059669;color:#fff;}
  .btn-green:hover{background:#047857;}
  .btn-danger{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
  .btn-danger:hover{background:rgba(239,68,68,0.3);}
  .btn-ghost{background:transparent;color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1);}
  .btn-ghost:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}

  .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;}
  .card h2{font-size:1rem;font-weight:600;margin-bottom:0.75rem;}

  .info-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:0.8rem;color:rgba(255,255,255,0.6);line-height:1.6;}
  .info-box strong{color:rgba(255,255,255,0.85);}

  /* Auth screen */
  .auth-screen{max-width:400px;margin:3rem auto;text-align:center;}
  .auth-screen .icon{font-size:2.5rem;margin-bottom:1rem;}
  .auth-screen h2{font-size:1.3rem;font-weight:700;margin-bottom:0.4rem;}
  .auth-screen p{color:rgba(255,255,255,0.45);font-size:0.82rem;margin-bottom:1.5rem;line-height:1.6;}
  .auth-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.05);border-radius:8px;padding:3px;margin-bottom:1.25rem;}
  .auth-tab{flex:1;padding:0.45rem;border:none;background:transparent;color:rgba(255,255,255,0.45);border-radius:6px;cursor:pointer;font-size:0.82rem;font-weight:500;transition:all 0.15s;}
  .auth-tab.active{background:#1e3a6e;color:#fff;}
  .field{margin-bottom:0.75rem;text-align:left;}
  .field label{display:block;font-size:0.7rem;color:rgba(255,255,255,0.4);margin-bottom:4px;letter-spacing:0.05em;text-transform:uppercase;}
  .field input{width:100%;padding:0.65rem 0.85rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:8px;color:#fff;font-size:0.95rem;outline:none;transition:border-color 0.15s;}
  .field input:focus{border-color:rgba(99,102,241,0.6);}
  .field input[type=number]{-moz-appearance:textfield;letter-spacing:0.25em;font-size:1.1rem;text-align:center;}
  .field input[type=number]::-webkit-outer-spin-button,
  .field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  .auth-error{color:#f87171;font-size:0.78rem;margin-bottom:0.75rem;min-height:1.2em;text-align:left;}
  .pin-hint{font-size:0.72rem;color:rgba(255,255,255,0.3);margin-top:4px;}

  /* Slots */
  .slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:1rem;}
  .slot{border-radius:8px;padding:0.6rem 0.8rem;font-size:0.82rem;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:6px;}
  .slot.empty{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.25);}
  .slot.taken{background:rgba(37,99,235,0.12);border-color:rgba(37,99,235,0.3);color:#93c5fd;}
  .slot.mine{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:#34d399;font-weight:600;}
  .slot-num{font-size:0.68rem;opacity:0.5;}

  /* Spin */
  .spin-area{text-align:center;padding:0.5rem 0;}
  .spin-area .label{font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:0.25rem;}
  .spin-area .tier-title{font-size:1.1rem;font-weight:700;margin-bottom:1rem;}
  .wheel-wrap{position:relative;width:320px;height:320px;margin:0 auto 1.25rem;}
  canvas#wheel{border-radius:50%;display:block;}
  .pointer{position:absolute;top:50%;left:50%;width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-bottom:32px solid #fff;transform:translate(-50%,-88%);filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));pointer-events:none;}
  .spin-btn{font-size:1rem;padding:0.75rem 2.5rem;background:linear-gradient(135deg,#2563eb,#7c3aed);border:none;border-radius:50px;color:#fff;cursor:pointer;font-weight:700;letter-spacing:0.04em;box-shadow:0 4px 20px rgba(37,99,235,0.4);transition:all 0.15s;}
  .spin-btn:hover:not(:disabled){transform:translateY(-1px);}
  .spin-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

  .result-banner{background:linear-gradient(135deg,rgba(37,99,235,0.2),rgba(124,58,237,0.2));border:1px solid rgba(99,102,241,0.4);border-radius:12px;padding:1rem 1.5rem;margin:1rem auto;max-width:380px;text-align:center;}
  .result-banner .team-name{font-size:1.4rem;font-weight:700;margin:0.25rem 0;}
  .tier-badge{display:inline-block;font-size:0.68rem;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.05em;}
  .tier1-badge{background:rgba(251,191,36,0.2);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);}
  .tier2-badge{background:rgba(148,163,184,0.2);color:#94a3b8;border:1px solid rgba(148,163,184,0.3);}
  .tier3-badge{background:rgba(180,83,9,0.2);color:#d97706;border:1px solid rgba(180,83,9,0.3);}
  .tier4-badge{background:rgba(99,102,241,0.2);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3);}

  .my-teams{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;margin-top:0.75rem;}
  .my-team-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:0.6rem 0.8rem;font-size:0.82rem;}
  .my-team-card .tc-tier{font-size:0.65rem;color:rgba(255,255,255,0.35);margin-bottom:3px;}
  .my-team-card .tc-name{font-weight:600;}

  .progress-bar{background:rgba(255,255,255,0.08);border-radius:4px;height:5px;margin:0.5rem 0 1rem;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:4px;transition:width 0.4s;}

  .results-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
  .results-table th{text-align:left;padding:0.5rem 0.6rem;font-size:0.68rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.07);}
  .results-table td{padding:0.55rem 0.6rem;border-bottom:1px solid rgba(255,255,255,0.04);}
  .results-table tr:last-child td{border-bottom:none;}

  .complete-banner{background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(5,150,105,0.2));border:1px solid rgba(16,185,129,0.4);border-radius:12px;padding:1.2rem 1.5rem;text-align:center;margin-bottom:1.5rem;}
  .complete-banner h2{font-size:1.1rem;color:#34d399;margin-bottom:0.25rem;}
  .complete-banner p{font-size:0.8rem;color:rgba(255,255,255,0.5);}

  .loading-overlay{position:fixed;inset:0;background:rgba(10,22,40,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:0.75rem;}
  .loading-overlay p{color:rgba(255,255,255,0.6);font-size:0.9rem;}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#60a5fa;border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .tabs{display:flex;gap:4px;background:rgba(255,255,255,0.05);border-radius:10px;padding:4px;margin-bottom:1.5rem;}
  .tab{flex:1;padding:0.55rem;border:none;background:transparent;color:rgba(255,255,255,0.5);border-radius:7px;cursor:pointer;font-size:0.85rem;font-weight:500;transition:all 0.15s;}
  .tab.active{background:#1e3a6e;color:#fff;}

  .admin-badge{font-size:0.62rem;background:rgba(251,191,36,0.2);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;}
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;}
  .team-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:0.55rem 0.75rem;display:flex;align-items:center;justify-content:space-between;font-size:0.8rem;}
  .team-rank{font-size:0.68rem;color:rgba(255,255,255,0.3);margin-right:5px;}
  .waiting-screen{text-align:center;padding:2.5rem 1rem;}
  .waiting-screen .big{font-size:2.5rem;margin-bottom:0.75rem;}
  .waiting-screen h2{font-size:1.1rem;font-weight:600;margin-bottom:0.5rem;}
  .waiting-screen p{font-size:0.82rem;color:rgba(255,255,255,0.45);line-height:1.6;}

  .me-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:0.5rem 0.85rem;margin-bottom:1.25rem;font-size:0.8rem;}
  .me-bar span{color:#34d399;font-weight:600;}
  .me-bar .logout-btn{background:transparent;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:0.75rem;padding:2px 6px;border-radius:4px;}
  .me-bar .logout-btn:hover{color:rgba(255,255,255,0.6);}
</style>
</head>
<body>

<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <p>Loading sweepstake...</p>
</div>

<header>
  <div class="trophy">🏆</div>
  <div>
    <h1>World Cup 2026 Sweepstake</h1>
    <p>48 teams · 12 players · 4 teams each</p>
  </div>
  <div id="sync-dot" class="sync-dot"></div>
</header>

<div class="container" id="main-container" style="display:none;"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'YOUR_PROJECT_URL';
const SUPABASE_KEY = 'YOUR_ANON_KEY';
// ─────────────────────────────────────────────────────────────────────────────

const ALL_TEAMS = [
  {rank:1,name:"France",flag:"🇫🇷",tier:1},{rank:2,name:"Spain",flag:"🇪🇸",tier:1},
  {rank:3,name:"Argentina",flag:"🇦🇷",tier:1},{rank:4,name:"England",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",tier:1},
  {rank:5,name:"Portugal",flag:"🇵🇹",tier:1},{rank:6,name:"Brazil",flag:"🇧🇷",tier:1},
  {rank:7,name:"Netherlands",flag:"🇳🇱",tier:1},{rank:8,name:"Morocco",flag:"🇲🇦",tier:1},
  {rank:9,name:"Belgium",flag:"🇧🇪",tier:1},{rank:10,name:"Germany",flag:"🇩🇪",tier:1},
  {rank:11,name:"Croatia",flag:"🇭🇷",tier:1},{rank:12,name:"Colombia",flag:"🇨🇴",tier:1},
  {rank:13,name:"Senegal",flag:"🇸🇳",tier:2},{rank:14,name:"Mexico",flag:"🇲🇽",tier:2},
  {rank:15,name:"USA",flag:"🇺🇸",tier:2},{rank:16,name:"Uruguay",flag:"🇺🇾",tier:2},
  {rank:17,name:"Japan",flag:"🇯🇵",tier:2},{rank:18,name:"Switzerland",flag:"🇨🇭",tier:2},
  {rank:19,name:"Iran",flag:"🇮🇷",tier:2},{rank:20,name:"Turkey",flag:"🇹🇷",tier:2},
  {rank:21,name:"Ecuador",flag:"🇪🇨",tier:2},{rank:22,name:"Austria",flag:"🇦🇹",tier:2},
  {rank:23,name:"South Korea",flag:"🇰🇷",tier:2},{rank:24,name:"Australia",flag:"🇦🇺",tier:2},
  {rank:25,name:"Algeria",flag:"🇩🇿",tier:3},{rank:26,name:"Egypt",flag:"🇪🇬",tier:3},
  {rank:27,name:"Canada",flag:"🇨🇦",tier:3},{rank:28,name:"Norway",flag:"🇳🇴",tier:3},
  {rank:29,name:"Panama",flag:"🇵🇦",tier:3},{rank:30,name:"Ivory Coast",flag:"🇨🇮",tier:3},
  {rank:31,name:"Sweden",flag:"🇸🇪",tier:3},{rank:32,name:"Paraguay",flag:"🇵🇾",tier:3},
  {rank:33,name:"Czechia",flag:"🇨🇿",tier:3},{rank:34,name:"Scotland",flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",tier:3},
  {rank:35,name:"Tunisia",flag:"🇹🇳",tier:3},{rank:36,name:"DR Congo",flag:"🇨🇩",tier:3},
  {rank:37,name:"Uzbekistan",flag:"🇺🇿",tier:4},{rank:38,name:"Qatar",flag:"🇶🇦",tier:4},
  {rank:39,name:"Iraq",flag:"🇮🇶",tier:4},{rank:40,name:"South Africa",flag:"🇿🇦",tier:4},
  {rank:41,name:"Saudi Arabia",flag:"🇸🇦",tier:4},{rank:42,name:"Jordan",flag:"🇯🇴",tier:4},
  {rank:43,name:"Bosnia & Herz.",flag:"🇧🇦",tier:4},{rank:44,name:"Cape Verde",flag:"🇨🇻",tier:4},
  {rank:45,name:"Ghana",flag:"🇬🇭",tier:4},{rank:46,name:"Curacao",flag:"🇨🇼",tier:4},
  {rank:47,name:"Haiti",flag:"🇭🇹",tier:4},{rank:48,name:"New Zealand",flag:"🇳🇿",tier:4},
];

const TIER_COLORS=['#fbbf24','#94a3b8','#d97706','#a78bfa'];
const TIER_NAMES=['Tier 1 — Top 12','Tier 2 — 13 to 24','Tier 3 — 25 to 36','Tier 4 — 37 to 48'];
const TIER_BADGE=['tier1-badge','tier2-badge','tier3-badge','tier4-badge'];

// gs = shared state stored in Supabase
let gs = {
  phase:'joining', // joining | spinning | done
  slots: Array(12).fill(null).map(()=>({name:null,pin:null,assignments:[],nextTier:1})),
  remainingByTier:{1:[...ALL_TEAMS.filter(t=>t.tier===1)],2:[...ALL_TEAMS.filter(t=>t.tier===2)],3:[...ALL_TEAMS.filter(t=>t.tier===3)],4:[...ALL_TEAMS.filter(t=>t.tier===4)]},
  adminName:null,
};

let myName=null, mySlot=null, spinAngle=0, pollTimer=null;
const isConfigured = SUPABASE_URL!=='YOUR_PROJECT_URL' && SUPABASE_KEY!=='YOUR_ANON_KEY';

// ── Supabase ──────────────────────────────────────────────────────────────────
function sbH(){return{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};}
async function dbLoad(){
  const r=await fetch(SUPABASE_URL+'/rest/v1/sweepstake?id=eq.main&select=state',{headers:sbH()});
  if(!r.ok)throw new Error('load '+r.status);
  const rows=await r.json();
  if(rows.length&&rows[0].state&&rows[0].state.phase) gs=rows[0].state;
}
async function dbSave(){
  setSyncDot('syncing');
  const r=await fetch(SUPABASE_URL+'/rest/v1/sweepstake?id=eq.main',{method:'PATCH',headers:{...sbH(),'Prefer':'return=minimal'},body:JSON.stringify({state:gs,updated_at:new Date().toISOString()})});
  if(!r.ok){setSyncDot('error');throw new Error('save '+r.status);}
  setSyncDot('synced');
}
function setSyncDot(s){document.getElementById('sync-dot').className='sync-dot '+s;}

function startPolling(){
  if(!isConfigured)return;
  pollTimer=setInterval(async()=>{
    try{const p=JSON.stringify(gs);await dbLoad();if(JSON.stringify(gs)!==p)rerender();}catch(e){}
  },4000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  if(isConfigured){try{await dbLoad();setSyncDot('synced');}catch(e){setSyncDot('error');}}
  // Restore login from localStorage
  const saved=localStorage.getItem('wc2026_login');
  if(saved){
    const{name,pin}=JSON.parse(saved);
    const idx=gs.slots.findIndex(s=>s.name===name&&s.pin===pin);
    if(idx!==-1){myName=name;mySlot=idx;}
    else localStorage.removeItem('wc2026_login');
  }
  document.getElementById('loading-overlay').style.display='none';
  document.getElementById('main-container').style.display='';
  rerender();
  startPolling();
}

// ── Render router ─────────────────────────────────────────────────────────────
function rerender(){
  if(!myName) renderAuthScreen();
  else        renderApp();
}

// ── Auth screen ───────────────────────────────────────────────────────────────
let authMode='join'; // 'join' | 'login'

function renderAuthScreen(){
  const el=document.getElementById('main-container');
  el.innerHTML=`
    <div class="auth-screen">
      <div class="icon">⚽</div>
      <h2>World Cup Sweepstake</h2>
      <p>Join for the first time, or log back in if you've already claimed a slot.</p>
      <div class="auth-tabs">
        <button class="auth-tab ${authMode==='join'?'active':''}" onclick="setAuthMode('join')">Join</button>
        <button class="auth-tab ${authMode==='login'?'active':''}" onclick="setAuthMode('login')">Log back in</button>
      </div>
      ${authMode==='join' ? renderJoinForm() : renderLoginForm()}
    </div>
    <div class="card" style="max-width:480px;margin:0 auto;">
      <h2>Players joined <span style="color:rgba(255,255,255,0.3);font-weight:400;font-size:0.85rem;">${gs.slots.filter(s=>s.name).length} / 12</span></h2>
      <div class="slots-grid">${slotsHtml()}</div>
    </div>`;
}

function renderJoinForm(){
  return `
    <div class="field"><label>Your name</label><input id="f-name" type="text" placeholder="e.g. Sarah" maxlength="30" onkeydown="if(event.key==='Enter')doJoin()"/></div>
    <div class="field">
      <label>Choose a 4-digit PIN</label>
      <input id="f-pin" type="number" placeholder="1234" min="1000" max="9999" onkeydown="if(event.key==='Enter')doJoin()"/>
      <div class="pin-hint">You'll use this PIN to log back in if you close the browser.</div>
    </div>
    <div class="auth-error" id="auth-err"></div>
    <button class="btn btn-green" style="width:100%;padding:0.7rem;" onclick="doJoin()">Claim my slot →</button>`;
}

function renderLoginForm(){
  return `
    <div class="field"><label>Your name</label><input id="f-name" type="text" placeholder="e.g. Sarah" maxlength="30" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="field">
      <label>Your PIN</label>
      <input id="f-pin" type="number" placeholder="1234" min="1000" max="9999" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="auth-error" id="auth-err"></div>
    <button class="btn btn-primary" style="width:100%;padding:0.7rem;" onclick="doLogin()">Log in →</button>`;
}

function setAuthMode(mode){authMode=mode;renderAuthScreen();}

async function doJoin(){
  const name=document.getElementById('f-name').value.trim();
  const pin=document.getElementById('f-pin').value.trim();
  const err=document.getElementById('auth-err');
  if(!name){err.textContent='Please enter your name.';return;}
  if(!pin||pin.length!==4||isNaN(pin)){err.textContent='Please choose a 4-digit PIN (e.g. 1234).';return;}
  if(isConfigured){try{await dbLoad();}catch(e){}}
  if(gs.phase!=='joining'){err.textContent='The sweepstake has already started — use Log back in instead.';return;}
  if(gs.slots.every(s=>s.name)){err.textContent='All 12 slots are taken!';return;}
  if(gs.slots.some(s=>s.name&&s.name.toLowerCase()===name.toLowerCase())){err.textContent='That name is already taken — try a different one.';return;}
  const idx=gs.slots.findIndex(s=>!s.name);
  gs.slots[idx].name=name;
  gs.slots[idx].pin=pin;
  if(!gs.adminName)gs.adminName=name;
  if(isConfigured){try{await dbSave();}catch(e){err.textContent='Could not save — check your Supabase config.';return;}}
  myName=name;mySlot=idx;
  localStorage.setItem('wc2026_login',JSON.stringify({name,pin}));
  rerender();
}

async function doLogin(){
  const name=document.getElementById('f-name').value.trim();
  const pin=document.getElementById('f-pin').value.trim();
  const err=document.getElementById('auth-err');
  if(!name||!pin){err.textContent='Please enter your name and PIN.';return;}
  if(isConfigured){try{await dbLoad();}catch(e){}}
  const idx=gs.slots.findIndex(s=>s.name&&s.name.toLowerCase()===name.toLowerCase()&&s.pin===pin);
  if(idx===-1){err.textContent='Name and PIN do not match — check and try again.';return;}
  myName=gs.slots[idx].name;mySlot=idx;
  localStorage.setItem('wc2026_login',JSON.stringify({name:myName,pin}));
  rerender();
}

function logout(){
  myName=null;mySlot=null;spinAngle=0;
  localStorage.removeItem('wc2026_login');
  authMode='login';
  rerender();
}

// ── App ───────────────────────────────────────────────────────────────────────
function renderApp(){
  // Re-sync mySlot in case state was reloaded
  mySlot=gs.slots.findIndex(s=>s.name===myName);
  if(mySlot===-1){logout();return;}

  const el=document.getElementById('main-container');

  // Preserve active tab
  const prevTab=el.querySelector('.tab.active')?.dataset?.tab||'lobby';

  el.innerHTML=`
    <div class="me-bar">
      <div>Signed in as <span>${escHtml(myName)}</span>${myName===gs.adminName?'<span class="admin-badge">host</span>':''}</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="tabs">
      <button class="tab${prevTab==='lobby'?' active':''}" data-tab="lobby" onclick="showTab('lobby')">Lobby</button>
      <button class="tab${prevTab==='spin'?' active':''}" data-tab="spin" onclick="showTab('spin')">My Spin</button>
      <button class="tab${prevTab==='results'?' active':''}" data-tab="results" onclick="showTab('results')">Results</button>
      <button class="tab${prevTab==='teams'?' active':''}" data-tab="teams" onclick="showTab('teams')">All Teams</button>
    </div>
    <div id="tab-lobby"   style="display:${prevTab==='lobby'?'':'none'}"></div>
    <div id="tab-spin"    style="display:${prevTab==='spin'?'':'none'}"></div>
    <div id="tab-results" style="display:${prevTab==='results'?'':'none'}"></div>
    <div id="tab-teams"   style="display:${prevTab==='teams'?'':'none'}"></div>`;

  renderLobby();
  if(prevTab==='spin')    renderSpinUI();
  if(prevTab==='results') renderResults();
  if(prevTab==='teams')   renderTeams();
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  ['lobby','spin','results','teams'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el)el.style.display=t===tab?'':'none';
  });
  if(tab==='spin')    renderSpinUI();
  if(tab==='results') renderResults();
  if(tab==='teams')   renderTeams();
}

// ── Lobby ─────────────────────────────────────────────────────────────────────
function renderLobby(){
  const el=document.getElementById('tab-lobby');
  if(!el)return;
  const taken=gs.slots.filter(s=>s.name).length;
  const isAdmin=myName===gs.adminName;
  let html=`<div class="card"><h2>Players <span style="color:rgba(255,255,255,0.3);font-weight:400;font-size:0.85rem;">${taken} / 12</span></h2><div class="slots-grid">${slotsHtml()}</div>`;

  if(gs.phase==='joining'){
    if(isAdmin){
      html+=`<button class="btn btn-green" onclick="startSpinning()" ${taken<2?'disabled':''}>
        ${taken===12?"Everyone's in — Start Spinning! 🎉":'Start with '+taken+' players →'}
      </button>
      <p style="font-size:0.75rem;color:rgba(255,255,255,0.35);margin-top:0.5rem;">You're the host — start when everyone is ready.</p>`;
    } else {
      html+=`<p style="font-size:0.82rem;color:rgba(255,255,255,0.4);">Waiting for <strong style="color:rgba(255,255,255,0.7);">${escHtml(gs.adminName)}</strong> to start…</p>`;
    }
  } else if(gs.phase==='spinning'){
    const slot=gs.slots[mySlot];
    if(slot.nextTier<=4){
      html+=`<div class="info-box" style="border-color:rgba(37,99,235,0.3);background:rgba(37,99,235,0.07);margin-top:0.75rem;">
        🎯 Go to <strong>My Spin</strong> to spin for ${TIER_NAMES[slot.nextTier-1]}.</div>`;
    } else {
      html+=`<div class="info-box" style="border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.07);margin-top:0.75rem;">
        ✅ You've finished all 4 spins! Check <strong>Results</strong>.</div>`;
    }
    if(isAdmin)html+=`<div style="margin-top:0.75rem;"><button class="btn btn-danger" onclick="resetAll()">Reset sweepstake</button></div>`;
  } else {
    html+=`<div class="complete-banner" style="margin-top:0.75rem;"><h2>🎉 Sweepstake complete!</h2><p>Check the Results tab.</p></div>`;
    if(isAdmin)html+=`<button class="btn btn-danger" onclick="resetAll()">Reset sweepstake</button>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

function slotsHtml(){
  return gs.slots.map((s,i)=>{
    if(!s.name) return `<div class="slot empty"><span class="slot-num">${i+1}</span> Open</div>`;
    if(s.name===myName) return `<div class="slot mine"><span class="slot-num">${i+1}</span>${escHtml(s.name)} (you)</div>`;
    return `<div class="slot taken"><span class="slot-num">${i+1}</span>${escHtml(s.name)}</div>`;
  }).join('');
}

async function startSpinning(){
  if(gs.phase!=='joining')return;
  gs.phase='spinning';
  if(isConfigured)await dbSave();
  rerender();
  showTab('spin');
}

// ── Spin ──────────────────────────────────────────────────────────────────────
function renderSpinUI(){
  const el=document.getElementById('tab-spin');
  if(!el)return;
  if(gs.phase==='joining'){
    el.innerHTML=`<div class="waiting-screen"><div class="big">⏳</div><h2>Waiting to start</h2><p>The host hasn't started yet.<br>Check the Lobby tab.</p></div>`;
    return;
  }
  const slot=gs.slots[mySlot];
  const nextTier=slot.nextTier;
  if(nextTier>4){
    el.innerHTML=`<div class="complete-banner"><h2>✅ All your teams are in!</h2><p>Here's what you got:</p></div>
      <div class="my-teams">${slot.assignments.map((t,i)=>`
        <div class="my-team-card"><div class="tc-tier">${TIER_NAMES[i]}</div><div class="tc-name">${t.flag} ${t.name}</div></div>`).join('')}</div>`;
    return;
  }
  const teams=gs.remainingByTier[nextTier];
  el.innerHTML=`
    <div class="spin-area">
      <div class="label">Spinning for</div>
      <div class="tier-title" style="color:${TIER_COLORS[nextTier-1]}">${TIER_NAMES[nextTier-1]}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(((nextTier-1)/4)*100)}%"></div></div>
      ${slot.assignments.length?`<div class="my-teams" style="margin-bottom:1.25rem;">${slot.assignments.map((t,i)=>`
        <div class="my-team-card"><div class="tc-tier">${TIER_NAMES[i]}</div><div class="tc-name">${t.flag} ${t.name}</div></div>`).join('')}</div>`:''}
      <div class="wheel-wrap"><canvas id="wheel" width="320" height="320"></canvas><div class="pointer"></div></div>
      <button class="spin-btn" id="spin-btn" onclick="doSpin()">SPIN ⚽</button>
      <div id="result-area" style="margin-top:1rem;"></div>
    </div>`;
  drawWheel(teams,spinAngle);
}

function drawWheel(teams,angle){
  const canvas=document.getElementById('wheel');
  if(!canvas||!teams.length)return;
  const ctx=canvas.getContext('2d'),cx=160,cy=160,r=152;
  ctx.clearRect(0,0,320,320);
  const slice=(2*Math.PI)/teams.length;
  const tierIdx=(gs.slots[mySlot].nextTier||1)-1;
  const cols=[['#b45309','#d97706'],['#334155','#475569'],['#78350f','#92400e'],['#3b0764','#4c1d95']];
  const[c1,c2]=cols[Math.min(tierIdx,3)];
  teams.forEach((team,i)=>{
    const s=angle+i*slice-Math.PI/2,e=s+slice;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=i%2===0?c1:c2;ctx.fill();
    ctx.strokeStyle='#0a1628';ctx.lineWidth=1.5;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+slice/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';
    ctx.font=teams.length>8?'bold 10px sans-serif':'bold 12px sans-serif';
    ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=3;
    ctx.fillText(team.flag+' '+(team.name.length>12?team.name.substring(0,11)+'…':team.name),r-6,4);
    ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,20,0,2*Math.PI);ctx.fillStyle='#0a1628';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.stroke();
}

function doSpin(){
  const slot=gs.slots[mySlot];
  const teams=gs.remainingByTier[slot.nextTier];
  if(!teams||!teams.length)return;
  document.getElementById('spin-btn').disabled=true;
  const totalAngle=(5+Math.random()*4)*2*Math.PI+Math.floor(Math.random()*teams.length)*((2*Math.PI)/teams.length);
  const dur=3500,start=performance.now(),startAngle=spinAngle;
  function ease(t){return 1-Math.pow(1-t,4);}
  function animate(now){
    const t=Math.min((now-start)/dur,1);
    spinAngle=startAngle+totalAngle*ease(t);
    drawWheel(teams,spinAngle);
    if(t<1)requestAnimationFrame(animate);else finishSpin(teams,spinAngle,(2*Math.PI)/teams.length);
  }
  requestAnimationFrame(animate);
}

async function finishSpin(teams,finalAngle,slice){
  const norm=(((-finalAngle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI));
  const team=teams[Math.floor(norm/slice)%teams.length];
  if(isConfigured){try{await dbLoad();}catch(e){}}
  mySlot=gs.slots.findIndex(s=>s.name===myName);
  const slot=gs.slots[mySlot];
  const tierKey=slot.nextTier;
  gs.remainingByTier[tierKey]=gs.remainingByTier[tierKey].filter(t=>t.name!==team.name);
  slot.assignments.push(team);
  slot.nextTier++;
  if(gs.slots.filter(s=>s.name).every(s=>s.nextTier>4))gs.phase='done';
  if(isConfigured)await dbSave();
  const ra=document.getElementById('result-area');
  ra.innerHTML=`
    <div class="result-banner">
      <div style="font-size:0.82rem;color:rgba(255,255,255,0.5);">You got...</div>
      <div class="team-name">${team.flag} ${team.name}</div>
      <span class="tier-badge ${TIER_BADGE[tierKey-1]}">${TIER_NAMES[tierKey-1]}</span>
    </div>
    ${slot.nextTier<=4
      ?`<button class="btn btn-primary" style="margin-top:1rem;" onclick="nextTier()">Spin ${TIER_NAMES[slot.nextTier-1]} →</button>`
      :`<button class="btn btn-green" style="margin-top:1rem;" onclick="showTab('results')">See all results →</button>`}`;
}

function nextTier(){spinAngle=0;renderSpinUI();}

// ── Results ───────────────────────────────────────────────────────────────────
async function renderResults(){
  if(isConfigured){try{await dbLoad();setSyncDot('synced');}catch(e){setSyncDot('error');}}
  mySlot=gs.slots.findIndex(s=>s.name===myName);
  const el=document.getElementById('tab-results');
  if(!el)return;
  const active=gs.slots.filter(s=>s.name);
  let html=active.every(s=>s.nextTier>4)?`<div class="complete-banner"><h2>🎉 Sweepstake complete!</h2><p>All teams drawn.</p></div>`:'';
  html+=`<table class="results-table"><thead><tr><th>Player</th><th>Tier 1</th><th>Tier 2</th><th>Tier 3</th><th>Tier 4</th></tr></thead><tbody>`;
  active.forEach(s=>{
    html+=`<tr><td style="font-weight:600;color:${s.name===myName?'#34d399':'#60a5fa'}">${escHtml(s.name)}${s.name===myName?' ✦':''}</td>`;
    for(let t=0;t<4;t++){const team=s.assignments[t];html+=team?`<td>${team.flag} ${team.name}</td>`:`<td style="color:rgba(255,255,255,0.2)">—</td>`;}
    html+=`</tr>`;
  });
  html+=`</tbody></table><div style="margin-top:1rem;"><button class="btn btn-ghost" onclick="renderResults()">↻ Refresh</button></div>`;
  el.innerHTML=html;
}

// ── Teams ─────────────────────────────────────────────────────────────────────
function renderTeams(){
  const el=document.getElementById('tab-teams');
  if(!el)return;
  let html='';
  [1,2,3,4].forEach(tier=>{
    html+=`<h3 style="font-size:0.82rem;font-weight:600;color:${TIER_COLORS[tier-1]};margin:1rem 0 0.5rem;letter-spacing:0.05em;text-transform:uppercase;">${TIER_NAMES[tier-1]}</h3><div class="teams-grid">`;
    ALL_TEAMS.filter(t=>t.tier===tier).forEach(team=>{
      const owner=gs.slots.find(s=>(s.assignments||[]).some(a=>a.name===team.name));
      html+=`<div class="team-card"><div><span class="team-rank">#${team.rank}</span>${team.flag} ${team.name}</div>${owner?`<span style="font-size:0.68rem;color:rgba(255,255,255,0.35);">${escHtml(owner.name)}</span>`:''}</div>`;
    });
    html+=`</div>`;
  });
  el.innerHTML=html;
}

// ── Reset ─────────────────────────────────────────────────────────────────────
async function resetAll(){
  if(!confirm('Reset the entire sweepstake? Everyone will need to rejoin.'))return;
  gs={phase:'joining',slots:Array(12).fill(null).map(()=>({name:null,pin:null,assignments:[],nextTier:1})),remainingByTier:{1:[...ALL_TEAMS.filter(t=>t.tier===1)],2:[...ALL_TEAMS.filter(t=>t.tier===2)],3:[...ALL_TEAMS.filter(t=>t.tier===3)],4:[...ALL_TEAMS.filter(t=>t.tier===4)]},adminName:null};
  myName=null;mySlot=null;spinAngle=0;
  localStorage.removeItem('wc2026_login');
  if(isConfigured)await dbSave();
  authMode='join';
  rerender();
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
